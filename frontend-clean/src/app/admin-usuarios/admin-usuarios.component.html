<div class="max-w-4xl mx-auto p-4 space-y-4">

  <h2 class="text-xl font-bold">👥 Gestión de Usuarios</h2>

  <div class="flex flex-col md:flex-row gap-2">
    <input [(ngModel)]="nuevo.username" placeholder="Usuario" class="border p-2 rounded w-full">
    <input [(ngModel)]="nuevo.password" placeholder="Password" class="border p-2 rounded w-full">
    <button (click)="crear()" class="bg-green-500 text-white px-3 py-2 rounded w-full md:w-auto">
      Crear
    </button>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full border mt-4 text-center">
      <thead>
        <tr>
          <th>ID</th>
          <th>Usuario</th>
          <th>Rol</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let u of usuarios">
          <td>{{ u.id }}</td>
          <td>{{ u.username }}</td>

          <td>
            <select [(ngModel)]="u.rol" (change)="cambiarRol(u)">
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </td>

          <td class="flex flex-col md:flex-row gap-2 justify-center">
            <button (click)="eliminar(u.id)" class="bg-red-500 text-white px-2 rounded">
              Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
