<div class="max-w-5xl mx-auto p-4 space-y-6">

  <h2 class="text-2xl font-bold text-center"> Panel Admin</h2>
  <div class="bg-gray-100 p-4 rounded space-y-2">

    <h3 class="font-bold">📂 Catálogo de Municipios</h3>

    <!-- CREAR -->
    <input [(ngModel)]="nuevoMunicipio"
          placeholder="Nuevo municipio"
          class="w-full border p-2 rounded">

    <button (click)="crearMunicipio()"
            class="bg-green-500 text-white px-3 py-2 rounded w-full md:w-auto">
      Agregar
    </button>

    <!-- LISTA -->
    <div *ngFor="let m of municipios" class="flex flex-col md:flex-row gap-2 items-center">

      <input [(ngModel)]="m.nombre"
            class="border p-1 rounded w-full">

      <button (click)="editarMunicipio(m)"
              class="bg-yellow-500 text-white px-2 rounded">
        Editar
      </button>

      <button (click)="eliminarMunicipio(m.id)"
              class="bg-red-500 text-white px-2 rounded">
        X
      </button>

    </div>

  </div>
  <!-- BUSCAR -->
  <input [(ngModel)]="busqueda"
         placeholder="Buscar por CURP o nombre"
         class="w-full border p-2 rounded">

  <!-- MODIFICAR -->
  <div class="bg-gray-100 p-4 rounded space-y-2">
    <h3 class="font-bold">Modificar Ticket</h3>

    <input [(ngModel)]="mod.curp" placeholder="CURP" class="w-full border p-2 rounded">
    <input [(ngModel)]="mod.turno" placeholder="Turno" class="w-full border p-2 rounded">
    <input [(ngModel)]="mod.nombre" placeholder="Nuevo nombre" class="w-full border p-2 rounded">

    <button (click)="modificar()"
            class="w-full md:w-auto bg-yellow-500 text-white px-3 py-2 rounded">
      Modificar
    </button>
  </div>

  <!-- TABLA -->
  <div class="overflow-x-auto">
    <table class="w-full border text-sm">
      <thead class="bg-gray-200">
        <tr>
          <th>Nombre</th>
          <th>CURP</th>
          <th>Turno</th>
          <th>Estatus</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let t of filtrados()" class="text-center">
          <td>{{ t.nombre }}</td>
          <td>{{ t.curp }}</td>
          <td>{{ t.turno }}</td>
          <td>{{ t.estatus }}</td>
          <td class="space-x-2">
            <button (click)="eliminar(t.id)" class="text-red-500">Eliminar</button>

            <button (click)="cambiarStatus(t.id, 'Resuelto')"
                    class="text-green-600">
              Resolver
            </button>

            <button routerLink="/admin"
                    class="bg-gray-500 text-white px-3 py-2 rounded">
              ← Volver
            </button>

            <button (click)="irUsuarios()"
                    class="bg-purple-500 text-white px-3 py-2 rounded">
              👥 Usuarios
            </button>

            <button routerLink="/municipios"
                    class="bg-yellow-500 text-white px-3 py-2 rounded">
              📂 Municipios
            </button>


          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- BOTONES -->
  <div class="flex flex-col md:flex-row gap-2">
    <button (click)="logout()"
            class="w-full md:w-auto bg-red-500 text-white px-3 py-2 rounded">
      Cerrar sesión
    </button>

    <button routerLink="/dashboard"
            class="w-full md:w-auto bg-blue-500 text-white px-3 py-2 rounded">
      Ver Dashboard
    </button>

    <button routerLink="/usuarios" class="bg-purple-500 text-white px-3 py-2 rounded">
      👥 Usuarios
    </button>

  </div>

</div>
