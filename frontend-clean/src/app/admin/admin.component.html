<div class="min-h-screen bg-gray-100 p-6">

  <!--  NAVBAR -->
    <div class="font-bold text-lg">
      🎟 Ticket Turno
    </div>

    <div class="flex gap-4">

      <a routerLink="/admin" class="hover:text-blue-400">🧾 Tickets</a>

      <a routerLink="/dashboard" class="hover:text-green-400">📊 Dashboard</a>

      <a routerLink="/usuarios" class="hover:text-purple-400">👥 Usuarios</a>

      <a routerLink="/municipios" class="hover:text-yellow-400">📂 Municipios</a>

      <button (click)="logout()" class="text-red-400 hover:text-red-600">
         Salir
      </button>

    </div>
  </nav>

  <!-- TÍTULO -->
  <h2 class="text-2xl font-bold mb-6 text-center">
    Panel Admin
  </h2>

  <!-- BUSCADOR -->
  <div class="bg-white p-4 rounded-xl shadow mb-6">
    
    <input [(ngModel)]="busqueda"
           placeholder="Buscar por nombre o CURP"
           class="w-full border p-2 mb-3 rounded">

    <button (click)="buscar()"
            class="w-full bg-blue-500 text-white px-4 py-2 rounded hover:scale-105 transition">
      Buscar
    </button>

  </div>

  <!-- RESULTADOS -->
  <div *ngIf="resultados.length > 0">

    <h3 class="text-lg font-bold mb-3">Resultados:</h3>

    <div *ngFor="let t of resultados"
         class="bg-white border p-4 mb-3 rounded-xl shadow">

      <p><b>Nombre:</b> {{t.nombre}}</p>
      <p><b>CURP:</b> {{t.curp}}</p>
      <p><b>Turno:</b> {{t.turno}}</p>
      <p><b>Estatus:</b> {{t.estatus}}</p>

      <div class="flex gap-2 mt-3 flex-wrap">

        <button (click)="cambiarEstatus(t.id, 'Resuelto')"
                class="bg-green-500 text-white px-3 py-1 rounded">
          ✔ Resuelto
        </button>

        <button (click)="cambiarEstatus(t.id, 'Pendiente')"
                class="bg-yellow-500 text-white px-3 py-1 rounded">
          ⏳ Pendiente
        </button>

        <button (click)="eliminar(t.id)"
                class="bg-red-500 text-white px-3 py-1 rounded">
          Eliminar
        </button>

      </div>

    </div>

  </div>

  <!-- TABLA GENERAL -->
  <div class="bg-white p-4 rounded-xl shadow mt-6">

    <h3 class="text-lg font-bold mb-3">Todos los tickets:</h3>

    <table class="w-full text-sm border">
      <thead class="bg-gray-200">
        <tr>
          <th class="p-2">Nombre</th>
          <th class="p-2">CURP</th>
          <th class="p-2">Turno</th>
          <th class="p-2">Estatus</th>
          <th class="p-2">Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let t of tickets" class="text-center border-t">

          <td class="p-2">{{ t.nombre }}</td>
          <td class="p-2">{{ t.curp }}</td>
          <td class="p-2">{{ t.turno }}</td>
          <td class="p-2">{{ t.estatus }}</td>

          <td class="p-2 space-x-2">

            <button (click)="cambiarEstatus(t.id, 'Resuelto')"
                    class="text-green-600">
              ✔
            </button>

            <button (click)="eliminar(t.id)"
                    class="text-red-500">
              🗑
            </button>

          </td>

        </tr>
      </tbody>

    </table>

  </div>

</div>
