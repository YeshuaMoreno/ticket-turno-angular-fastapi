<div class="max-w-5xl mx-auto p-4 space-y-6">

  <h2 class="text-2xl font-bold text-center">
    📊 Dashboard de Tickets
  </h2>

  <!-- FILTRO -->
  <select [(ngModel)]="municipio_id" (change)="cargarDatos()" class="w-full md:w-auto border p-2 rounded">
    <option [ngValue]="null">Todos</option>
    <option *ngFor="let m of municipios" [ngValue]="m.id">
      {{ m.nombre }}
    </option>
  </select>

  <!-- CARDS -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">

    <div class="bg-blue-100 p-4 rounded shadow">
      <p>Total</p>
      <p class="text-2xl">{{ data.total }}</p>
    </div>

    <div class="bg-yellow-100 p-4 rounded shadow">
      <p>Pendientes</p>
      <p class="text-2xl">{{ data.pendientes }}</p>
    </div>

    <div class="bg-green-100 p-4 rounded shadow">
      <p>Resueltos</p>
      <p class="text-2xl">{{ data.resueltos }}</p>
    </div>

  </div>

  <!-- GRÁFICA -->
  <div class="flex justify-center">
    <div style="width: 300px; height: 300px;">
      <canvas id="grafica"></canvas>
    </div>
  </div>

  <button (click)="volver()" class="w-full md:w-auto bg-gray-500 text-white px-3 py-2 rounded">
    ← Volver
  </button>

</div>
