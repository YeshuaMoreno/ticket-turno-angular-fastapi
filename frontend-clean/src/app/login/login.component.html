<div class="min-h-screen flex items-center justify-center bg-gray-100">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-80 space-y-4">

    <h2 class="text-2xl font-semibold text-center text-gray-800">
      Login
    </h2>

    <input [(ngModel)]="username"
      placeholder="Usuario"
      class="w-full border border-gray-300 p-2 rounded-full outline-none focus:ring-2 focus:ring-gray-400">

    <input [(ngModel)]="password"
      type="password"
      placeholder="Contraseña"
      class="w-full border border-gray-300 p-2 rounded-full outline-none focus:ring-2 focus:ring-gray-400">

    <div class="text-sm text-gray-500 text-center">
      ¿Cuánto es {{num1}} + {{num2}}?
    </div>

    <input [(ngModel)]="captchaUser"
      type="number"
      placeholder="Respuesta"
      class="w-full border border-gray-300 p-2 rounded-full outline-none focus:ring-2 focus:ring-gray-400">

    <button (click)="login()"
      class="w-full bg-black text-white py-2 rounded-full hover:bg-gray-800 transition">
      Login
    </button>

    <button routerLink="/register"
      class="w-full bg-green-500 text-white py-2 rounded-full hover:bg-green-600 transition">
      Crear cuenta
    </button>

    <div class="text-center text-sm text-gray-500 cursor-pointer hover:underline"
         (click)="recuperar()">
      Forgot your password?
    </div>

  </div>

</div>
